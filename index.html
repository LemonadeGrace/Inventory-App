<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .header p { color: #94a3b8; font-size: 14px; }
        .button-group { display: flex; gap: 10px; }
        button {
            padding: 10px 16px;
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #3b82f6; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #334155; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #7f1d1d; padding: 6px 12px; font-size: 12px; }
        .btn-danger:hover { background: #991b1b; }
        .btn-edit { background: #334155; padding: 6px 12px; font-size: 12px; }
        .btn-edit:hover { background: #475569; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .stat-label { color: #94a3b8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; color: #e2e8f0; }
        .stat-card.warning { border-color: #fbbf24; }
        .stat-card.warning .stat-value { color: #fbbf24; }
        .stat-card.danger { border-color: #ef4444; }
        .stat-card.danger .stat-value { color: #ef4444; }
        .category-section { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 30px; }
        .category-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
        .category-card { background: #0f172a; padding: 12px; border-radius: 8px; border: 1px solid #334155; }
        .category-card p { margin: 0; }
        .category-card .cat-name { color: #94a3b8; font-size: 12px; margin-bottom: 4px; }
        .category-card .cat-qty { font-size: 18px; font-weight: 700; }
        .category-card .cat-items { color: #64748b; font-size: 11px; margin-top: 4px; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
        thead { background: #0f172a; border-bottom: 1px solid #334155; }
        th { padding: 12px; text-align: left; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 12px; }
        tbody tr { border-bottom: 1px solid #334155; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #334155; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .status-in { background: #dcfce7; color: #22c55e; }
        .status-low { background: #ffedd5; color: #f97316; }
        .status-out { background: #fee2e2; color: #ef4444; }
        .form-container { max-width: 600px; margin: 0 auto; }
        .form-card { background: #1e293b; padding: 24px; border-radius: 12px; border: 1px solid #334155; }
        .form-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 16px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #cbd5e1; }
        input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: inherit; }
        input:focus { outline: none; border-color: #3b82f6; }
        .btn-submit { margin-top: 8px; width: 100%; }
        .btn-cancel { width: 100%; }
        .items-section { margin-top: 24px; }
        .items-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .item-card { background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-info p { margin: 0; }
        .item-info .item-name { font-weight: 600; }
        .item-info .item-details { color: #94a3b8; font-size: 12px; margin-top: 4px; }
        .item-actions { display: flex; gap: 8px; }
        .empty-state { padding: 20px; text-align: center; color: #64748b; }
        .firebase-status { position: fixed; bottom: 20px; right: 20px; padding: 12px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .firebase-status.connected { background: #dcfce7; color: #22c55e; }
        .firebase-status.disconnected { background: #fee2e2; color: #ef4444; }
        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 20px; }
            .button-group { width: 100%; }
            button { flex: 1; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 🔥 FIREBASE CONFIG 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyDHjikUDbMWOZLbcdmIXnvd2gCgygrF-PI",
            authDomain: "inventory-app-c633e.firebaseapp.com",
            databaseURL: "https://inventory-app-c633e.firebaseio.com",
            projectId: "inventory-app-c633e",
            storageBucket: "inventory-app-c633e.firebasestorage.app",
            messagingSenderId: "900793397928",
            appId: "1:900793397928:web:5134ca9138768ef183089d"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database(app);

        function InventoryApp() {
            const [items, setItems] = useState([]);
            const [viewMode, setViewMode] = useState('monitoring');
            const [formData, setFormData] = useState({ name: '', category: '', quantity: 0, lowStockThreshold: 5, assignedTo: '' });
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isConnected, setIsConnected] = useState(false);

            useEffect(() => {
                const itemsRef = database.ref('inventory');
                
                itemsRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const itemsArray = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        }));
                        setItems(itemsArray);
                    } else {
                        setItems([]);
                    }
                    setLoading(false);
                    setIsConnected(true);
                });

                return () => itemsRef.off('value');
            }, []);

            const handleAddItem = () => {
                if (!formData.name || !formData.category) {
                    alert('Please fill in Item Name and Category');
                    return;
                }

                const itemsRef = database.ref('inventory');

                if (editingId) {
                    itemsRef.child(editingId).update({
                        name: formData.name,
                        category: formData.category,
                        quantity: parseInt(formData.quantity),
                        lowStockThreshold: parseInt(formData.lowStockThreshold),
                        assignedTo: formData.assignedTo,
                        updatedAt: new Date().toISOString()
                    }).catch(err => console.error('Update failed:', err));
                    setEditingId(null);
                } else {
                    const newItem = {
                        name: formData.name,
                        category: formData.category,
                        quantity: parseInt(formData.quantity),
                        lowStockThreshold: parseInt(formData.lowStockThreshold),
                        assignedTo: formData.assignedTo,
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    
                    itemsRef.push(newItem).catch(err => console.error('Add failed:', err));
                }

                setFormData({ name: '', category: '', quantity: 0, lowStockThreshold: 5, assignedTo: '' });
            };

            const handleEdit = (item) => {
                setFormData({ 
                    name: item.name, 
                    category: item.category, 
                    quantity: item.quantity.toString(), 
                    lowStockThreshold: item.lowStockThreshold.toString(), 
                    assignedTo: item.assignedTo 
                });
                setEditingId(item.id);
            };

            const handleDelete = (id) => {
                if (window.confirm('Are you sure you want to delete this item?')) {
                    database.ref('inventory').child(id).remove().catch(err => console.error('Delete failed:', err));
                }
            };

            const getStockStatus = (quantity, threshold) => {
                if (quantity === 0) return { status: 'Out of Stock', className: 'status-out' };
                if (quantity <= threshold) return { status: 'Low Stock', className: 'status-low' };
                return { status: 'In Stock', className: 'status-in' };
            };

            const stats = {
                totalItems: items.length,
                totalQuantity: items.reduce((sum, item) => sum + item.quantity, 0),
                lowStock: items.filter(item => item.quantity <= item.lowStockThreshold && item.quantity > 0).length,
                outOfStock: items.filter(item => item.quantity === 0).length
            };

            const categories = [...new Set(items.map(item => item.category))];

            if (loading) {
                return <div className="empty-state">Connecting to Firebase... 🔥</div>;
            }

            return (
                <div className="container">
                    <div className="header">
                        <div>
                            <h1>Inventory System</h1>
                            <p>Real-time tracking & monitoring 🔥</p>
                        </div>
                        <div className="button-group">
                            <button 
                                className={viewMode === 'monitoring' ? 'btn-primary' : 'btn-secondary'}
                                onClick={() => setViewMode('monitoring')}
                            >
                                📊 Monitoring
                            </button>
                            <button 
                                className={viewMode === 'personnel' ? 'btn-primary' : 'btn-secondary'}
                                onClick={() => setViewMode('personnel')}
                            >
                                ➕ Add/Update
                            </button>
                        </div>
                    </div>

                    {viewMode === 'monitoring' && (
                        <div>
                            <div className="stats-grid">
                                <div className="stat-card">
                                    <div className="stat-label">Total Items</div>
                                    <div className="stat-value">{stats.totalItems}</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Total Quantity</div>
                                    <div className="stat-value">{stats.totalQuantity}</div>
                                </div>
                                <div className="stat-card warning">
                                    <div className="stat-label">Low Stock</div>
                                    <div className="stat-value">{stats.lowStock}</div>
                                </div>
                                <div className="stat-card danger">
                                    <div className="stat-label">Out of Stock</div>
                                    <div className="stat-value">{stats.outOfStock}</div>
                                </div>
                            </div>

                            {categories.length > 0 && (
                                <div className="category-section">
                                    <h3>By Category</h3>
                                    <div className="category-grid">
                                        {categories.map(cat => {
                                            const catItems = items.filter(item => item.category === cat);
                                            const catQuantity = catItems.reduce((sum, item) => sum + item.quantity, 0);
                                            return (
                                                <div key={cat} className="category-card">
                                                    <p className="cat-name">{cat}</p>
                                                    <p className="cat-qty">{catQuantity}</p>
                                                    <p className="cat-items">{catItems.length} items</p>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            <table>
                                <thead>
                                    <tr>
                                        <th>Item</th>
                                        <th>Category</th>
                                        <th>Quantity</th>
                                        <th>Status</th>
                                        <th>Assigned To</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {items.length === 0 ? (
                                        <tr>
                                            <td colSpan="5" className="empty-state">No inventory items yet</td>
                                        </tr>
                                    ) : (
                                        items.map(item => {
                                            const status = getStockStatus(item.quantity, item.lowStockThreshold);
                                            return (
                                                <tr key={item.id}>
                                                    <td style={{ fontWeight: '500' }}>{item.name}</td>
                                                    <td style={{ color: '#cbd5e1' }}>{item.category}</td>
                                                    <td style={{ fontWeight: '600' }}>{item.quantity}</td>
                                                    <td>
                                                        <span className={`status-badge ${status.className}`}>
                                                            {status.status}
                                                        </span>
                                                    </td>
                                                    <td style={{ color: '#cbd5e1' }}>{item.assignedTo || '—'}</td>
                                                </tr>
                                            );
                                        })
                                    )}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {viewMode === 'personnel' && (
                        <div className="form-container">
                            <div className="form-card">
                                <h2>{editingId ? 'Update Item' : 'Add New Item'}</h2>

                                <div className="form-group">
                                    <div>
                                        <label>Item Name *</label>
                                        <input
                                            id="itemName"
                                            name="itemName"
                                            type="text"
                                            value={formData.name}
                                            onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                            placeholder="e.g., Office Supplies, Equipment"
                                        />
                                    </div>

                                    <div>
                                        <label>Category *</label>
                                        <input
                                            id="category"
                                            name="category"
                                            type="text"
                                            value={formData.category}
                                            onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                                            placeholder="e.g., Electronics, Tools, Supplies"
                                        />
                                    </div>

                                    <div className="form-row">
                                        <div>
                                            <label>Quantity *</label>
                                            <input
                                                id="quantity"
                                                name="quantity"
                                                type="number"
                                                value={formData.quantity}
                                                onChange={(e) => setFormData({ ...formData, quantity: e.target.value })}
                                                min="0"
                                            />
                                        </div>

                                        <div>
                                            <label>Low Stock Threshold</label>
                                            <input
                                                id="threshold"
                                                name="threshold"
                                                type="number"
                                                value={formData.lowStockThreshold}
                                                onChange={(e) => setFormData({ ...formData, lowStockThreshold: e.target.value })}
                                                min="0"
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label>Assigned To (Your Name)</label>
                                        <input
                                            id="assignedTo"
                                            name="assignedTo"
                                            type="text"
                                            value={formData.assignedTo}
                                            onChange={(e) => setFormData({ ...formData, assignedTo: e.target.value })}
                                            placeholder="e.g., John Smith"
                                        />
                                    </div>

                                    <button 
                                        className="btn-primary btn-submit"
                                        onClick={handleAddItem}
                                    >
                                        {editingId ? 'Update Item' : 'Add Item'}
                                    </button>

                                    {editingId && (
                                        <button 
                                            className="btn-secondary btn-cancel"
                                            onClick={() => {
                                                setEditingId(null);
                                                setFormData({ name: '', category: '', quantity: 0, lowStockThreshold: 5, assignedTo: '' });
                                            }}
                                        >
                                            Cancel
                                        </button>
                                    )}
                                </div>
                            </div>

                            {items.length > 0 && (
                                <div className="items-section">
                                    <h3>Your Items</h3>
                                    {items.filter(item => item.assignedTo === formData.assignedTo || !formData.assignedTo).map(item => (
                                        <div key={item.id} className="item-card">
                                            <div className="item-info">
                                                <p className="item-name">{item.name}</p>
                                                <p className="item-details">
                                                    {item.category} • {item.quantity} units
                                                </p>
                                            </div>
                                            <div className="item-actions">
                                                <button 
                                                    className="btn-edit"
                                                    onClick={() => handleEdit(item)}
                                                >
                                                    ✏️ Edit
                                                </button>
                                                <button 
                                                    className="btn-danger"
                                                    onClick={() => handleDelete(item.id)}
                                                >
                                                    🗑️ Delete
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}

                    <div className={`firebase-status ${isConnected ? 'connected' : 'disconnected'}`}>
                        {isConnected ? '✅ Connected to Firebase' : '❌ Disconnected'}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<InventoryApp />, document.getElementById('root'));
    </script>
</body>
</html>
