<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .app { max-width: 1200px; margin: 0 auto; }
        .header {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 28px; margin-bottom: 16px; }
        .nav-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .nav-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #334155;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #475569; }
        .nav-btn.active { background: #3b82f6; }
        .role-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .role-badge {
            padding: 8px 12px;
            border-radius: 6px;
            background: #164e63;
            color: #67e8f9;
            font-size: 12px;
            font-weight: 600;
        }
        .role-badge.staff {
            background: #14532d;
            color: #86efac;
        }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .screen-content {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }
        
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #334155; color: white; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #7f1d1d; color: #fecaca; }
        .btn-danger:hover { background: #991b1b; }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .item-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }
        .item-card.low { border-color: #ef4444; }
        .item-icon { font-size: 32px; margin-bottom: 12px; }
        .item-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .item-stock { font-size: 24px; font-weight: 700; color: #22c55e; margin-bottom: 12px; }
        .item-stock.low { color: #ef4444; }
        .card-actions { display: flex; gap: 8px; margin-top: 12px; }
        .card-actions .btn { flex: 1; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 30px; width: 90%; max-width: 500px; }
        .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; }
        .form-input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; }
        .form-input:focus { outline: none; border-color: #3b82f6; }
        .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
        .modal-actions .btn { flex: 1; }
        
        .entry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .entry-card { background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
        .entry-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; font-weight: 600; }
        .entry-display { background: #164e63; padding: 10px 12px; border-radius: 6px; font-size: 16px; font-weight: 700; color: #67e8f9; margin-bottom: 12px; }
        .entry-input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 16px; margin-bottom: 12px; }
        .entry-input:focus { outline: none; border-color: #3b82f6; }
        
        .report-table { width: 100%; border-collapse: collapse; background: #0f172a; border-radius: 8px; overflow: hidden; margin-top: 16px; }
        .report-table th { background: #334155; padding: 12px; text-align: left; font-weight: 600; font-size: 12px; }
        .report-table td { padding: 12px; border-bottom: 1px solid #334155; }
        
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; background: #164e63; border: 1px solid #155e75; color: #67e8f9; }
        .empty-state { text-align: center; padding: 40px; color: #94a3b8; }
        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            .inventory-grid, .entry-grid { grid-template-columns: 1fr; }
            .nav-tabs { flex-direction: column; }
            .role-controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>🍋 Inventory Tracker</h1>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="switchTab('inventory')">📦 Inventory</button>
                <button class="nav-btn" onclick="switchTab('daily')">📝 Daily Entry</button>
                <button class="nav-btn" onclick="switchTab('reports')">📊 Reports</button>
                <button class="nav-btn" id="settingsTab" onclick="switchTab('settings')" class="hidden">⚙️ Settings</button>
            </div>
            <div class="role-controls">
                <span class="role-badge" id="roleBadge">Staff</span>
                <button class="btn btn-secondary btn-small" onclick="toggleRole()">Switch Role</button>
            </div>
        </div>

        <!-- INVENTORY -->
        <div id="inventory" class="screen active">
            <div class="screen-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Inventory Items</h2>
                    <button class="btn btn-primary" id="addItemBtn" onclick="openModal()" style="display: none;">+ Add Item</button>
                </div>
                <div id="inventoryList" class="inventory-grid"></div>
            </div>
        </div>

        <!-- DAILY ENTRY -->
        <div id="daily" class="screen">
            <div class="screen-content">
                <h2 id="entryTitle">Daily Entry</h2>
                <div class="alert">ℹ️ Beginning stock auto-populates from yesterday's ending stock.</div>
                <div id="entryList" class="entry-grid"></div>
                <button class="btn btn-primary" id="submitBtn" onclick="submitEntry()" style="margin-top: 20px; display: none;">Submit Daily Entry</button>
            </div>
        </div>

        <!-- REPORTS -->
        <div id="reports" class="screen">
            <div class="screen-content">
                <h2>Reports</h2>
                <div id="reportsList"></div>
            </div>
        </div>

        <!-- SETTINGS -->
        <div id="settings" class="screen">
            <div class="screen-content">
                <h2>Settings</h2>
                <div id="settingsList"></div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Add New Item</div>
            <div class="form-group">
                <label class="form-label" for="itemName">Item Name *</label>
                <input type="text" id="itemName" class="form-input" placeholder="e.g., Lemons">
            </div>
            <div class="form-group">
                <label class="form-label" for="itemIcon">Icon (optional)</label>
                <input type="text" id="itemIcon" class="form-input" placeholder="🍋" value="📦" maxlength="2">
            </div>
            <div class="form-group">
                <label class="form-label" for="itemUnit">Unit *</label>
                <input type="text" id="itemUnit" class="form-input" placeholder="e.g., pcs, kg">
            </div>
            <div class="form-group">
                <label class="form-label" for="itemStock">Current Stock *</label>
                <input type="number" id="itemStock" class="form-input" placeholder="0" value="0" step="0.1">
            </div>
            <div class="form-group">
                <label class="form-label" for="itemThreshold">Low Stock Threshold *</label>
                <input type="number" id="itemThreshold" class="form-input" placeholder="10" value="10" step="0.1">
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ifkwnqrjzmqkyhmujdmz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlma3ducXJqem1xa3lobXVqZG16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTk3NDIsImV4cCI6MjA5NjA5NTc0Mn0.5LJ77LZtKd1LC0yZkoqEQhCzTxQzMEVbiQMQTKT3BZk';
        
        let supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let userRole = localStorage.getItem('userRole') || 'staff';
        let items = [];
        let entries = [];
        let editingId = null;
        const today = new Date().toISOString().split('T')[0];

        function updateUI() {
            const isManager = userRole === 'manager';
            document.getElementById('roleBadge').textContent = isManager ? 'Manager' : 'Staff';
            document.getElementById('roleBadge').className = 'role-badge ' + (isManager ? 'manager' : 'staff');
            document.getElementById('addItemBtn').style.display = isManager ? 'block' : 'none';
            document.getElementById('settingsTab').classList.toggle('hidden', !isManager);
            document.getElementById('submitBtn').style.display = isManager ? 'none' : 'block';
        }

        function toggleRole() {
            userRole = userRole === 'staff' ? 'manager' : 'staff';
            localStorage.setItem('userRole', userRole);
            updateUI();
        }

        function switchTab(tab) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function loadData() {
            try {
                const { data: itemsData } = await supabase.from('inventory_items').select('*');
                const { data: entriesData } = await supabase.from('daily_entries').select('*');
                
                items = itemsData || [];
                entries = entriesData || [];
                
                renderInventory();
                renderDaily();
                renderReports();
                renderSettings();
            } catch (error) {
                console.error('Error loading data:', error);
                alert('Error: ' + error.message);
            }
        }

        function renderInventory() {
            const html = items.filter(i => i.active !== false).map(item => {
                const isLow = item.current_stock <= item.low_stock_threshold;
                return `
                    <div class="item-card ${isLow ? 'low' : ''}">
                        <div class="item-icon">${item.icon || '📦'}</div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-stock ${isLow ? 'low' : ''}">${item.current_stock} ${item.unit}</div>
                        <div class="card-actions">
                            ${userRole === 'manager' ? `
                                <button class="btn btn-secondary btn-small" onclick="editItem('${item.id}')">Edit</button>
                                <button class="btn btn-danger btn-small" onclick="archiveItem('${item.id}')">Archive</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('inventoryList').innerHTML = html || '<div class="empty-state">No items</div>';
        }

        function renderDaily() {
            const entryDate = new Date(today).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('entryTitle').textContent = 'Daily Entry - ' + entryDate;

            const html = items.filter(i => i.active !== false).map(item => {
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];
                const lastEntry = entries.find(e => e.item_id === item.id && e.date === yesterdayStr);
                const beginning = lastEntry ? lastEntry.ending : item.current_stock;
                
                return `
                    <div class="entry-card">
                        <div style="font-size: 16px; font-weight: 700; margin-bottom: 16px;">${item.icon || '📦'} ${item.name}</div>
                        <div class="entry-label">Beginning</div>
                        <div class="entry-display">${beginning} ${item.unit}</div>
                        <div class="entry-label">Added</div>
                        <input type="number" class="entry-input" data-item="${item.id}" data-field="added" placeholder="0" value="0" step="0.1" onchange="calcUsed()">
                        <div class="entry-label">Ending</div>
                        <input type="number" class="entry-input" data-item="${item.id}" data-field="ending" placeholder="0" value="${beginning}" step="0.1" onchange="calcUsed()">
                        <div class="entry-label">Used (auto)</div>
                        <div class="entry-display" data-used="${item.id}">0 ${item.unit}</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('entryList').innerHTML = html || '<div class="empty-state">No items</div>';
        }

        function calcUsed() {
            document.querySelectorAll('[data-used]').forEach(elem => {
                const itemId = elem.getAttribute('data-used');
                const item = items.find(i => i.id === itemId);
                const added = parseFloat(document.querySelector(`[data-item="${itemId}"][data-field="added"]`).value) || 0;
                const ending = parseFloat(document.querySelector(`[data-item="${itemId}"][data-field="ending"]`).value) || 0;
                
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];
                const lastEntry = entries.find(e => e.item_id === itemId && e.date === yesterdayStr);
                const beginning = lastEntry ? lastEntry.ending : item.current_stock;
                
                const used = beginning + added - ending;
                elem.textContent = `${used.toFixed(1)} ${item.unit}`;
            });
        }

        async function submitEntry() {
            if (userRole !== 'staff') return alert('Only staff can submit');
            
            for (const item of items.filter(i => i.active !== false)) {
                const added = parseFloat(document.querySelector(`[data-item="${item.id}"][data-field="added"]`).value) || 0;
                const ending = parseFloat(document.querySelector(`[data-item="${item.id}"][data-field="ending"]`).value) || 0;
                
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];
                const lastEntry = entries.find(e => e.item_id === item.id && e.date === yesterdayStr);
                const beginning = lastEntry ? lastEntry.ending : item.current_stock;
                
                if (ending > beginning + added) {
                    return alert(`${item.name}: Ending cannot exceed Beginning + Added`);
                }
                
                const used = beginning + added - ending;
                
                await supabase.from('daily_entries').insert([{
                    date: today,
                    item_id: item.id,
                    beginning,
                    added,
                    ending,
                    used
                }]);
                
                await supabase.from('inventory_items').update({ current_stock: ending }).eq('id', item.id);
            }
            
            alert('Entry submitted!');
            loadData();
        }

        function renderReports() {
            let html = '<table class="report-table"><thead><tr><th>Date</th><th>Item</th><th>Beginning</th><th>Added</th><th>Ending</th><th>Used</th></tr></thead><tbody>';
            
            entries.slice(0, 20).forEach(entry => {
                const item = items.find(i => i.id === entry.item_id);
                if (!item) return;
                const d = new Date(entry.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                html += `<tr><td>${d}</td><td>${item.icon} ${item.name}</td><td>${entry.beginning}</td><td>${entry.added}</td><td>${entry.ending}</td><td><strong>${entry.used}</strong></td></tr>`;
            });
            
            html += '</tbody></table>';
            document.getElementById('reportsList').innerHTML = html;
        }

        function renderSettings() {
            const html = items.map(item => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #0f172a; border-radius: 8px; margin-bottom: 8px;">
                    <div>
                        <div style="font-weight: 600;">${item.icon} ${item.name}</div>
                        <div style="font-size: 12px; color: #94a3b8;">Unit: ${item.unit} | Low: ${item.low_stock_threshold}</div>
                    </div>
                    <div>
                        <button class="btn btn-secondary btn-small" onclick="editItem('${item.id}')">Edit</button>
                        <button class="btn btn-danger btn-small" onclick="archiveItem('${item.id}')">Archive</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('settingsList').innerHTML = html || '<div class="empty-state">No items</div>';
        }

        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add New Item';
            document.getElementById('itemName').value = '';
            document.getElementById('itemIcon').value = '📦';
            document.getElementById('itemUnit').value = '';
            document.getElementById('itemStock').value = '0';
            document.getElementById('itemThreshold').value = '10';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function editItem(id) {
            const item = items.find(i => i.id === id);
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Item';
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemIcon').value = item.icon || '📦';
            document.getElementById('itemUnit').value = item.unit;
            document.getElementById('itemStock').value = item.current_stock;
            document.getElementById('itemThreshold').value = item.low_stock_threshold;
            openModal();
        }

        async function saveItem() {
            const name = document.getElementById('itemName').value.trim();
            const icon = document.getElementById('itemIcon').value;
            const unit = document.getElementById('itemUnit').value.trim();
            const stock = parseFloat(document.getElementById('itemStock').value);
            const threshold = parseFloat(document.getElementById('itemThreshold').value);

            if (!name || !unit) return alert('Fill in Name and Unit');

            try {
                if (editingId) {
                    await supabase.from('inventory_items').update({ name, icon, unit, low_stock_threshold: threshold }).eq('id', editingId);
                } else {
                    await supabase.from('inventory_items').insert([{ name, icon, unit, current_stock: stock, low_stock_threshold: threshold, active: true }]);
                }
                closeModal();
                loadData();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function archiveItem(id) {
            if (confirm('Archive this item?')) {
                await supabase.from('inventory_items').update({ active: false }).eq('id', id);
                loadData();
            }
        }

        updateUI();
        loadData();
        
        window.onclick = (e) => {
            if (e.target.id === 'modal') closeModal();
        }
    </script>
</body>
</html>
